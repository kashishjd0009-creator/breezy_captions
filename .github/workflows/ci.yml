name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  CI-test:
    name: CI - Dependencies,Lint and Type Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript type checks
        run: npx tsc --noEmit

      - name: Lint Checks
        run: npm run lint

      - name: Build Check
        run: npm run build
